name: Build Windows EXE

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11' # Stabilna wersja do kompilacji

      - name: Install GTK3 Runtime (for WeasyPrint)
        run: |
          Invoke-WebRequest -Uri "https://github.com/tschoonj/GTK-for-Windows-Runtime-Environment-Installer/releases/download/2022-01-04/gtk3-runtime-3.24.31-2022-01-04-ts-win64.exe" -OutFile gtk3-installer.exe
          Start-Process -FilePath .\gtk3-installer.exe -ArgumentList "/S" -Wait
          echo "C:\Program Files\GTK3-Runtime Win64\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Install Python Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pyinstaller weasyprint beautifulsoup4 requests websockets tqdm

      - name: Build EXE with PyInstaller
        # Pakujemy wszystko do jednego pliku i dorzucamy potężne biblioteki GTK3 (.dll)
        run: |
          pyinstaller --onefile --name ibuk-dl `
          --add-binary "C:\Program Files\GTK3-Runtime Win64\bin\*.dll;." `
          ibuk_dl/main.py

      - name: Upload EXE Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ibuk-dl-windows
          path: dist/ibuk-dl.exe